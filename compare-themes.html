<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theme Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #111; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }

        .toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 8px 16px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            flex-shrink: 0;
        }
        .toolbar span {
            color: #888;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .label {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 4px;
        }
        .label-teal { background: #3D8280; color: #52D9D0; }
        .label-blue { background: #1A5FAD; color: #5BA4F5; }

        .frames {
            display: grid;
            grid-template-columns: 1fr 1fr;
            flex: 1;
            gap: 2px;
            background: #222;
        }
        .frame-wrap {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .frame-label {
            padding: 5px 12px;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            flex-shrink: 0;
        }
        .frame-label-teal { background: #0C0F12; color: #52D9D0; border-bottom: 2px solid #3D8280; }
        .frame-label-blue { background: #080C14; color: #5BA4F5; border-bottom: 2px solid #1A5FAD; }
        iframe {
            flex: 1;
            border: none;
            width: 100%;
            min-height: 0;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <span>Theme Comparison</span>
        <span class="label label-teal">Current — Teal</span>
        <span class="label label-blue">Option — Blue</span>
    </div>
    <div class="frames">
        <div class="frame-wrap">
            <div class="frame-label frame-label-teal">Current — Teal</div>
            <iframe src="index.html"></iframe>
        </div>
        <div class="frame-wrap">
            <div class="frame-label frame-label-blue">Option — Blue</div>
            <iframe src="index-blue.html"></iframe>
        </div>
    </div>
</body>
</html>
