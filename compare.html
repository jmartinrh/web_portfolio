<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Comparison</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d0d0d;
            font-family: sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── Toolbar ─────────────────────────────────────────────────────── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 16px;
            height: 40px;
            background: #111827;
            border-bottom: 2px solid #66FCF1;
            flex-shrink: 0;
        }

        .toolbar-title {
            color: #66FCF1;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .pill {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .pill-current {
            background: #2a2a2a;
            color: #9ca3af;
            border: 1px solid #3a3a3a;
        }

        .pill-preview {
            background: #0d2626;
            color: #66FCF1;
            border: 1px solid #66FCF1;
        }

        .separator {
            color: #3a3a3a;
            font-size: 20px;
        }

        .toolbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .sync-label {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6b7280;
            font-size: 12px;
            cursor: pointer;
            user-select: none;
        }

        .sync-label input {
            cursor: pointer;
            accent-color: #66FCF1;
            width: 14px;
            height: 14px;
        }

        .sync-label:hover { color: #9ca3af; }

        .hint {
            color: #3a3a3a;
            font-size: 11px;
        }

        /* ── Frames ──────────────────────────────────────────────────────── */
        .frames-wrapper {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .frame-container {
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        .frame-label {
            padding: 4px 0;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-align: center;
            flex-shrink: 0;
        }

        .frame-label-current {
            background: #1a1a1a;
            color: #4b5563;
        }

        .frame-label-preview {
            background: #071a1a;
            color: #2f8a85;
        }

        iframe {
            flex: 1;
            border: none;
            width: 100%;
            display: block;
        }

        /* ── Divider ─────────────────────────────────────────────────────── */
        .divider {
            width: 6px;
            background: #1f2937;
            cursor: col-resize;
            flex-shrink: 0;
            position: relative;
            transition: background 0.15s;
            z-index: 10;
        }

        .divider:hover,
        .divider.active {
            background: #66FCF1;
        }

        .divider-handle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 3px;
            pointer-events: none;
        }

        .divider-handle span {
            display: block;
            width: 2px;
            height: 2px;
            background: #4b5563;
            border-radius: 50%;
        }

        .divider:hover .divider-handle span,
        .divider.active .divider-handle span {
            background: #0d0d0d;
        }
    </style>
</head>

<body>

    <div class="toolbar">
        <span class="toolbar-title">Style Comparison</span>
        <span class="pill pill-current">Current</span>
        <span class="separator">↔</span>
        <span class="pill pill-preview">Preview</span>

        <div class="toolbar-right">
            <span class="hint">Drag the divider to resize · Scroll inside either panel</span>
            <label class="sync-label">
                <input type="checkbox" id="sync-scroll" checked>
                Sync scroll
            </label>
        </div>
    </div>

    <div class="frames-wrapper" id="frames-wrapper">

        <div class="frame-container" id="left-pane" style="width: 50%;">
            <div class="frame-label frame-label-current">Current</div>
            <iframe id="iframe-current" src="index.html"></iframe>
        </div>

        <div class="divider" id="divider">
            <div class="divider-handle">
                <span></span><span></span><span></span>
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="frame-container" id="right-pane" style="flex: 1;">
            <div class="frame-label frame-label-preview">Preview</div>
            <iframe id="iframe-preview" src="index-preview.html"></iframe>
        </div>

    </div>

    <script>
        // ── Draggable divider ─────────────────────────────────────────────
        const divider     = document.getElementById('divider');
        const leftPane    = document.getElementById('left-pane');
        const wrapper     = document.getElementById('frames-wrapper');

        let dragging = false;

        divider.addEventListener('mousedown', e => {
            dragging = true;
            divider.classList.add('active');
            document.body.style.cursor      = 'col-resize';
            document.body.style.userSelect  = 'none';
            // Prevent iframes from eating mouse events during drag
            document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = 'none');
        });

        document.addEventListener('mousemove', e => {
            if (!dragging) return;
            const rect   = wrapper.getBoundingClientRect();
            const offset = e.clientX - rect.left - divider.offsetWidth / 2;
            const pct    = Math.min(Math.max(offset / rect.width * 100, 15), 85);
            leftPane.style.width = pct + '%';
        });

        document.addEventListener('mouseup', () => {
            if (!dragging) return;
            dragging = false;
            divider.classList.remove('active');
            document.body.style.cursor     = '';
            document.body.style.userSelect = '';
            document.querySelectorAll('iframe').forEach(f => f.style.pointerEvents = '');
        });

        // ── Synchronized scrolling ────────────────────────────────────────
        const syncCheckbox   = document.getElementById('sync-scroll');
        const iframeCurrent  = document.getElementById('iframe-current');
        const iframePreview  = document.getElementById('iframe-preview');

        let syncing = false;

        function syncScroll(sourceFrame, targetFrame) {
            if (!syncCheckbox.checked || syncing) return;
            syncing = true;

            try {
                const srcWin  = sourceFrame.contentWindow;
                const tgtWin  = targetFrame.contentWindow;
                const srcEl   = srcWin.document.documentElement;
                const tgtEl   = tgtWin.document.documentElement;

                const maxSrc  = srcEl.scrollHeight  - srcEl.clientHeight;
                const maxTgt  = tgtEl.scrollHeight  - tgtEl.clientHeight;
                const ratio   = maxSrc > 0 ? srcWin.scrollY / maxSrc : 0;

                tgtWin.scrollTo({ top: ratio * maxTgt, behavior: 'instant' });
            } catch (_) {
                // Cross-origin guard — sync unavailable
            }

            syncing = false;
        }

        function attachListeners() {
            try {
                iframeCurrent.contentWindow.addEventListener('scroll', () =>
                    syncScroll(iframeCurrent, iframePreview), { passive: true });

                iframePreview.contentWindow.addEventListener('scroll', () =>
                    syncScroll(iframePreview, iframeCurrent), { passive: true });
            } catch (_) {}
        }

        iframeCurrent.addEventListener('load', attachListeners);
        iframePreview.addEventListener('load', attachListeners);
    </script>

</body>
</html>
